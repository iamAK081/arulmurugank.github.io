<!DOCTYPE html>
<html>
<head>
    <title>{{ page.title }} - {{ site.title }}</title>
    <link rel="stylesheet" href="/assets/css/style.css">
</head>
<body>
    <div class="header">
        <h1>{{ page.title }}</h1>
        <p>By {{ page.author | default: site.author }} | {{ page.date | date: "%B %d, %Y" }}</p>
    </div>
    
    <div class="content">
        {{ content }}
    </div>
    
    <div class="footer">
        <p>© {{ site.time | date: "%Y" }} {{ site.author }}. All rights reserved.</p>
        <a href="/index.html">← Back to Home</a>
    </div>
</body>
</html>
